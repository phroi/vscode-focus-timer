name: Check (lint & build)

on: [pull_request, push]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20.17.0
      - uses: pnpm/action-setup@v4

      - name: Check (lint & build)
        run: pnpm check
